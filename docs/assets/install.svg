<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 720 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Terminal session installing Plan Enforcer in sixty seconds: clone, install.sh, doctor, then a first discuss command -- output shows hooks, skills, bin, and state directory wired in.">
  <rect width="720" height="360" fill="#0b0d10"/>

  <g font-family="ui-monospace,Menlo,Consolas,monospace" font-size="10" letter-spacing="3">
    <text x="20" y="20" fill="#1aadd9">INSTALL . T+60s</text>
    <text x="700" y="20" text-anchor="end" fill="#6f7a8c">FOUR SURFACES WIRED</text>
  </g>

  <g transform="translate(20,40)">
    <rect width="680" height="300" fill="#14171c" stroke="#2a2f38" stroke-width="1"/>
    <rect width="680" height="22" fill="#0b0d10"/>
    <text x="12" y="15" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="10" letter-spacing="2" fill="#6f7a8c">~/repo $</text>
    <circle cx="664" cy="11" r="3" fill="#1aadd9"/>

    <g font-family="ui-monospace,Menlo,Consolas,monospace" font-size="11" fill="#d8e1ec">
      <text x="14" y="48"><tspan fill="#6f7a8c">$</tspan> git clone https://github.com/jccidc/.plan-enforcer.git</text>
      <text x="14" y="66" fill="#3ec07a">  Cloning into '.plan-enforcer'...</text>
      <text x="14" y="90"><tspan fill="#6f7a8c">$</tspan> cd .plan-enforcer</text>
      <text x="14" y="114"><tspan fill="#6f7a8c">$</tspan> ./install.sh</text>
      <text x="14" y="132" fill="#3ec07a">  hooks       ok   (.claude/hooks/*)</text>
      <text x="14" y="148" fill="#3ec07a">  skills      ok   (.claude/skills/plan-enforcer-*)</text>
      <text x="14" y="164" fill="#3ec07a">  bin         ok   (bin/plan-enforcer)</text>
      <text x="14" y="180" fill="#3ec07a">  state dir   ok   (.plan-enforcer/)</text>
      <text x="14" y="206"><tspan fill="#6f7a8c">$</tspan> plan-enforcer doctor</text>
      <text x="14" y="224" fill="#3ec07a">  structural . ready</text>
      <text x="14" y="250"><tspan fill="#6f7a8c">$</tspan> plan-enforcer discuss "migrate auth to OIDC"</text>
      <text x="14" y="268" fill="#1aadd9">  packet -> .plan-enforcer/discuss.md</text>
      <text x="14" y="288" fill="#6f7a8c">  next: plan-enforcer-draft</text>
    </g>
  </g>
</svg>
