<svg width="1200" height="760" viewBox="0 0 1200 760" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Plan Enforcer carryover ladder</title>
  <desc id="desc">Carryover comparison bars across scenarios H through N, showing repaired-contract preservation for Plan Enforcer, GSD, and Superpowers.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="760" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="greenFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#112a18"/>
      <stop offset="1" stop-color="#1c2128"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.38"/>
    </filter>
    <style>
      .sans { font-family: "IBM Plex Sans", "Segoe UI", Arial, sans-serif; }
      .mono { font-family: "IBM Plex Mono", "Cascadia Code", Consolas, monospace; }
      .eyebrow { font-size: 13px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; fill: #8b949e; }
      .title { font-size: 28px; font-weight: 700; letter-spacing: -0.02em; fill: #e6edf3; }
      .subtitle { font-size: 14px; font-weight: 500; fill: #8b949e; }
      .kick { font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; fill: #3fb950; }
      .label { font-size: 13px; font-weight: 700; fill: #e6edf3; }
      .small { font-size: 11px; font-weight: 500; fill: #8b949e; }
      .value { font-size: 11px; font-weight: 700; fill: #e6edf3; }
      .footer { font-size: 11px; font-weight: 500; fill: #6e7681; }
    </style>
  </defs>

  <rect width="1200" height="760" fill="url(#bg)"/>

  <text x="60" y="54" class="sans eyebrow">Plan Enforcer / Carryover proof</text>
  <text x="60" y="90" class="sans title">The repaired contract keeps surviving.</text>
  <text x="60" y="118" class="sans subtitle">Each row adds more mutation or continuity pressure. The bar shows how much of the repaired contract still makes it through.</text>

  <g transform="translate(40, 164)">
    <rect width="1120" height="540" rx="12" fill="url(#greenFill)" stroke="#3fb950" stroke-width="1.4" filter="url(#shadow)"/>
    <text x="24" y="36" class="sans kick">Carryover ladder / bars by scenario</text>

    <!-- Legend -->
    <rect x="24" y="56" width="18" height="10" rx="5" fill="#3fb950"/>
    <text x="50" y="65" class="sans small">Plan Enforcer</text>
    <rect x="158" y="56" width="18" height="10" rx="5" fill="#58a6ff"/>
    <text x="184" y="65" class="sans small">GSD</text>
    <rect x="240" y="56" width="18" height="10" rx="5" fill="#d29922"/>
    <text x="266" y="65" class="sans small">Superpowers</text>

    <!-- scale labels -->
    <text x="368" y="65" class="sans small">0</text>
    <text x="1048" y="65" class="sans small" text-anchor="end">full repaired-contract coverage</text>

    <!-- H -->
    <text x="24" y="116" class="sans label">H</text>
    <text x="54" y="116" class="sans small">first separator</text>
    <rect x="260" y="100" width="720" height="12" rx="6" fill="#11161c" stroke="#30363d" stroke-width="1"/>
    <rect x="260" y="100" width="720" height="12" rx="6" fill="#3fb950"/>
    <text x="992" y="110" class="sans value">16 / 16</text>
    <rect x="260" y="118" width="585" height="10" rx="5" fill="#58a6ff"/>
    <text x="857" y="126" class="sans value">13 / 16</text>
    <rect x="260" y="134" width="540" height="10" rx="5" fill="#d29922"/>
    <text x="812" y="142" class="sans value">12 / 16</text>

    <!-- I -->
    <text x="24" y="186" class="sans label">I</text>
    <text x="54" y="186" class="sans small">medium repeat</text>
    <rect x="260" y="170" width="720" height="12" rx="6" fill="#11161c" stroke="#30363d" stroke-width="1"/>
    <rect x="260" y="170" width="720" height="12" rx="6" fill="#3fb950"/>
    <text x="992" y="180" class="sans value">24 / 24</text>
    <rect x="260" y="188" width="450" height="10" rx="5" fill="#58a6ff"/>
    <text x="722" y="196" class="sans value">15 / 24</text>
    <rect x="260" y="204" width="450" height="10" rx="5" fill="#d29922"/>
    <text x="722" y="212" class="sans value">15 / 24</text>

    <!-- J -->
    <text x="24" y="256" class="sans label">J</text>
    <text x="54" y="256" class="sans small">late mutation</text>
    <rect x="260" y="240" width="720" height="12" rx="6" fill="#11161c" stroke="#30363d" stroke-width="1"/>
    <rect x="260" y="240" width="720" height="12" rx="6" fill="#3fb950"/>
    <text x="992" y="250" class="sans value">28 / 28</text>
    <rect x="260" y="258" width="386" height="10" rx="5" fill="#58a6ff"/>
    <text x="658" y="266" class="sans value">15 / 28</text>
    <rect x="260" y="274" width="411" height="10" rx="5" fill="#d29922"/>
    <text x="683" y="282" class="sans value">16 / 28</text>

    <!-- K -->
    <text x="24" y="326" class="sans label">K</text>
    <text x="54" y="326" class="sans small">double mutation</text>
    <rect x="260" y="310" width="720" height="12" rx="6" fill="#11161c" stroke="#30363d" stroke-width="1"/>
    <rect x="260" y="310" width="720" height="12" rx="6" fill="#3fb950"/>
    <text x="992" y="320" class="sans value">32 / 32</text>
    <rect x="260" y="328" width="518" height="10" rx="5" fill="#58a6ff"/>
    <text x="790" y="336" class="sans value">23 / 32</text>
    <rect x="260" y="344" width="518" height="10" rx="5" fill="#d29922"/>
    <text x="790" y="352" class="sans value">23 / 32</text>

    <!-- K+ -->
    <text x="24" y="396" class="sans label">K+</text>
    <text x="54" y="396" class="sans small">resume pressure</text>
    <rect x="260" y="380" width="720" height="12" rx="6" fill="#11161c" stroke="#30363d" stroke-width="1"/>
    <rect x="260" y="380" width="720" height="12" rx="6" fill="#3fb950"/>
    <text x="992" y="390" class="sans value">32 / 32</text>
    <rect x="260" y="398" width="540" height="10" rx="5" fill="#58a6ff"/>
    <text x="812" y="406" class="sans value">24 / 32</text>
    <rect x="260" y="414" width="563" height="10" rx="5" fill="#d29922"/>
    <text x="835" y="422" class="sans value">25 / 32</text>

    <!-- L -->
    <text x="24" y="466" class="sans label">L</text>
    <text x="54" y="466" class="sans small">triple mutation</text>
    <rect x="260" y="450" width="720" height="12" rx="6" fill="#11161c" stroke="#30363d" stroke-width="1"/>
    <rect x="260" y="450" width="720" height="12" rx="6" fill="#3fb950"/>
    <text x="992" y="460" class="sans value">40 / 40</text>
    <rect x="260" y="468" width="576" height="10" rx="5" fill="#58a6ff"/>
    <text x="848" y="476" class="sans value">32 / 40</text>
    <rect x="260" y="484" width="612" height="10" rx="5" fill="#d29922"/>
    <text x="884" y="492" class="sans value">34 / 40</text>

    <!-- M -->
    <text x="24" y="536" class="sans label">M</text>
    <text x="54" y="536" class="sans small">fourth mutation</text>
    <rect x="260" y="520" width="720" height="12" rx="6" fill="#11161c" stroke="#30363d" stroke-width="1"/>
    <rect x="260" y="520" width="720" height="12" rx="6" fill="#3fb950"/>
    <text x="992" y="530" class="sans value">48 / 48</text>
    <rect x="260" y="538" width="600" height="10" rx="5" fill="#58a6ff"/>
    <text x="872" y="546" class="sans value">40 / 48</text>
    <rect x="260" y="554" width="555" height="10" rx="5" fill="#d29922"/>
    <text x="827" y="562" class="sans value">37 / 48</text>

    <!-- N -->
    <text x="24" y="606" class="sans label">N</text>
    <text x="54" y="606" class="sans small">fifth mutation</text>
    <rect x="260" y="590" width="720" height="12" rx="6" fill="#11161c" stroke="#30363d" stroke-width="1"/>
    <rect x="260" y="590" width="720" height="12" rx="6" fill="#3fb950"/>
    <text x="992" y="600" class="sans value">56 / 56</text>
    <rect x="260" y="608" width="553" height="10" rx="5" fill="#58a6ff"/>
    <text x="825" y="616" class="sans value">43 / 56</text>
    <rect x="260" y="624" width="604" height="10" rx="5" fill="#d29922"/>
    <text x="876" y="632" class="sans value">47 / 56</text>
  </g>

  <text x="60" y="728" class="sans footer">Every row is the same question: after the contract changed, what still survived into final truth?</text>
</svg>
