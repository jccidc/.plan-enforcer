<svg width="1200" height="560" viewBox="0 0 1200 560" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Plan Enforcer carryover ladder</title>
  <desc id="desc">Public carryover ladder showing repeated repaired-contract preservation wins for scenarios H through N against GSD and Superpowers.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="560" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#161b22"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <style>
      .sans { font-family: "IBM Plex Sans", "Segoe UI", Arial, sans-serif; }
      .mono { font-family: "IBM Plex Mono", "Cascadia Code", Consolas, monospace; }
      .eyebrow { font-size: 13px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; fill: #8b949e; }
      .title { font-size: 26px; font-weight: 700; letter-spacing: -0.02em; fill: #e6edf3; }
      .subtitle { font-size: 14px; font-weight: 500; fill: #8b949e; }
      .frame { fill: #161b22; stroke: #3fb950; stroke-width: 1.5; }
      .cell { fill: #1c2128; stroke: #30363d; stroke-width: 1.2; }
      .cell-title { font-size: 22px; font-weight: 700; fill: #3fb950; }
      .score-pe { font-size: 15px; font-weight: 700; fill: #e6edf3; }
      .score-other { font-size: 12px; font-weight: 600; fill: #8b949e; }
      .note { font-size: 11px; font-weight: 500; fill: #8b949e; }
      .callout-title { font-size: 13px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; fill: #3fb950; }
      .callout-body { font-size: 13px; font-weight: 500; fill: #c9d1d9; }
      .footer { font-size: 11px; font-weight: 500; fill: #6e7681; }
    </style>
  </defs>

  <rect width="1200" height="560" fill="url(#bg)"/>

  <text x="60" y="54" class="sans eyebrow">Plan Enforcer / Carryover proof</text>
  <text x="60" y="88" class="sans title">The repaired contract keeps surviving.</text>
  <text x="60" y="114" class="sans subtitle">This is the strongest repeated public proof: mutation, resume pressure, and final closure keep staying attached to what the user actually meant.</text>

  <g transform="translate(40, 160)">
    <rect width="1120" height="210" rx="12" class="frame" filter="url(#shadow)"/>
    <text x="24" y="36" class="sans callout-title">Carryover ladder / H through N</text>
    <text x="24" y="62" class="sans callout-body">Public wedge is not "better vibes." It is that repaired-plan truth survives more mutations, more resumptions, and more closure pressure than the alternatives.</text>
  </g>

  <g transform="translate(64, 230)">
    <rect width="140" height="110" rx="8" class="cell"/>
    <text x="18" y="34" class="sans cell-title">H</text>
    <text x="18" y="60" class="mono score-pe">PE 16 / 16</text>
    <text x="18" y="80" class="mono score-other">GSD 13 / 16</text>
    <text x="18" y="96" class="mono score-other">SP  12 / 16</text>
  </g>

  <g transform="translate(218, 230)">
    <rect width="140" height="110" rx="8" class="cell"/>
    <text x="18" y="34" class="sans cell-title">I</text>
    <text x="18" y="60" class="mono score-pe">PE 24 / 24</text>
    <text x="18" y="80" class="mono score-other">GSD 15 / 24</text>
    <text x="18" y="96" class="mono score-other">SP  15 / 24</text>
  </g>

  <g transform="translate(372, 230)">
    <rect width="140" height="110" rx="8" class="cell"/>
    <text x="18" y="34" class="sans cell-title">J</text>
    <text x="18" y="60" class="mono score-pe">PE 28 / 28</text>
    <text x="18" y="80" class="mono score-other">GSD 15 / 28</text>
    <text x="18" y="96" class="mono score-other">SP  16 / 28</text>
  </g>

  <g transform="translate(526, 230)">
    <rect width="140" height="110" rx="8" class="cell"/>
    <text x="18" y="34" class="sans cell-title">K</text>
    <text x="18" y="60" class="mono score-pe">PE 32 / 32</text>
    <text x="18" y="80" class="mono score-other">GSD 23 / 32</text>
    <text x="18" y="96" class="mono score-other">SP  23 / 32</text>
  </g>

  <g transform="translate(680, 230)">
    <rect width="140" height="110" rx="8" class="cell"/>
    <text x="18" y="34" class="sans cell-title">K+</text>
    <text x="18" y="60" class="mono score-pe">PE 32 / 32</text>
    <text x="18" y="80" class="mono score-other">GSD 24 / 32</text>
    <text x="18" y="96" class="mono score-other">SP  25 / 32</text>
  </g>

  <g transform="translate(834, 230)">
    <rect width="140" height="110" rx="8" class="cell"/>
    <text x="18" y="34" class="sans cell-title">L</text>
    <text x="18" y="60" class="mono score-pe">PE 40 / 40</text>
    <text x="18" y="80" class="mono score-other">GSD 32 / 40</text>
    <text x="18" y="96" class="mono score-other">SP  34 / 40</text>
  </g>

  <g transform="translate(988, 230)">
    <rect width="140" height="110" rx="8" class="cell"/>
    <text x="18" y="34" class="sans cell-title">M / N</text>
    <text x="18" y="60" class="mono score-pe">48 / 48, 56 / 56</text>
    <text x="18" y="80" class="mono score-other">40 / 48, 43 / 56</text>
    <text x="18" y="96" class="mono score-other">37 / 48, 47 / 56</text>
  </g>

  <g transform="translate(40, 408)">
    <rect width="1120" height="100" rx="10" fill="#1c2128" stroke="#30363d" stroke-width="1.2" filter="url(#shadow)"/>
    <text x="24" y="34" class="sans callout-title">Why this matters</text>
    <text x="24" y="60" class="sans callout-body">All three systems can still satisfy the visible ask a lot of the time. The separator is the harder thing: whether repaired-plan truth survives mutation, interruption, lineage, dossier, and final closure without silently falling back to an easier interpretation.</text>
  </g>

  <text x="60" y="538" class="sans footer">Public claim stays narrow: repeated carryover durability, not blanket superiority on every benchmark axis.</text>
</svg>
