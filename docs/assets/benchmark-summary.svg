<svg width="1200" height="760" viewBox="0 0 1200 760" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Plan Enforcer benchmark summary</title>
  <desc id="desc">Visual benchmark summary showing phased parity, large trust runtime, planning ambiguity score, and carryover totals.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="760" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="blueFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#182842"/>
      <stop offset="1" stop-color="#1c2128"/>
    </linearGradient>
    <linearGradient id="amberFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2a2010"/>
      <stop offset="1" stop-color="#1c2128"/>
    </linearGradient>
    <linearGradient id="greenFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#112a18"/>
      <stop offset="1" stop-color="#1c2128"/>
    </linearGradient>
    <linearGradient id="purpleFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1f1732"/>
      <stop offset="1" stop-color="#1c2128"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.38"/>
    </filter>
    <style>
      .sans { font-family: "IBM Plex Sans", "Segoe UI", Arial, sans-serif; }
      .mono { font-family: "IBM Plex Mono", "Cascadia Code", Consolas, monospace; }
      .eyebrow { font-size: 13px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; fill: #8b949e; }
      .title { font-size: 28px; font-weight: 700; letter-spacing: -0.02em; fill: #e6edf3; }
      .subtitle { font-size: 14px; font-weight: 500; fill: #8b949e; }
      .cardKick { font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; }
      .cardTitle { font-size: 19px; font-weight: 700; fill: #e6edf3; }
      .label { font-size: 12px; font-weight: 600; fill: #c9d1d9; }
      .small { font-size: 11px; font-weight: 500; fill: #8b949e; }
      .value { font-size: 12px; font-weight: 700; fill: #e6edf3; }
      .big { font-size: 26px; font-weight: 700; fill: #e6edf3; }
      .footer { font-size: 11px; font-weight: 500; fill: #6e7681; }
    </style>
  </defs>

  <rect width="1200" height="760" fill="url(#bg)"/>

  <text x="60" y="54" class="sans eyebrow">Plan Enforcer / Benchmark summary</text>
  <text x="60" y="90" class="sans title">What the benchmark actually says.</text>
  <text x="60" y="118" class="sans subtitle">Execution is credible. Planning is competitive. Carryover is the repeated moat.</text>

  <!-- Top row -->
  <g transform="translate(40, 170)">
    <rect width="540" height="230" rx="12" fill="url(#blueFill)" stroke="#58a6ff" stroke-width="1.4" filter="url(#shadow)"/>
    <text x="24" y="36" class="sans cardKick" fill="#58a6ff">Execution parity</text>
    <text x="24" y="64" class="sans cardTitle">Bounded work is not the problem.</text>

    <text x="24" y="104" class="sans label">Plan Enforcer</text>
    <rect x="150" y="92" width="330" height="18" rx="9" fill="#11161c" stroke="#30363d" stroke-width="1"/>
    <rect x="150" y="92" width="330" height="18" rx="9" fill="#58a6ff"/>
    <text x="492" y="106" class="sans value" text-anchor="end">24 / 24</text>

    <text x="24" y="136" class="sans label">GSD</text>
    <rect x="150" y="124" width="330" height="18" rx="9" fill="#11161c" stroke="#30363d" stroke-width="1"/>
    <rect x="150" y="124" width="330" height="18" rx="9" fill="#79c0ff"/>
    <text x="492" y="138" class="sans value" text-anchor="end">24 / 24</text>

    <text x="24" y="168" class="sans label">Superpowers</text>
    <rect x="150" y="156" width="330" height="18" rx="9" fill="#11161c" stroke="#30363d" stroke-width="1"/>
    <rect x="150" y="156" width="330" height="18" rx="9" fill="#a5d6ff"/>
    <text x="492" y="170" class="sans value" text-anchor="end">24 / 24</text>

    <text x="24" y="208" class="sans small">Small phased benchmark: all three finish bounded work.</text>
    <text x="24" y="226" class="sans small">PE has to be credible here, not magical here.</text>
  </g>

  <g transform="translate(620, 170)">
    <rect width="540" height="230" rx="12" fill="url(#greenFill)" stroke="#3fb950" stroke-width="1.4" filter="url(#shadow)"/>
    <text x="24" y="36" class="sans cardKick" fill="#3fb950">Carryover moat</text>
    <text x="24" y="64" class="sans cardTitle">Repaired-contract preservation is the separator.</text>

    <text x="24" y="104" class="sans label">Plan Enforcer</text>
    <rect x="180" y="92" width="300" height="22" rx="11" fill="#11161c" stroke="#30363d" stroke-width="1"/>
    <rect x="180" y="92" width="300" height="22" rx="11" fill="#3fb950"/>
    <text x="492" y="108" class="sans value" text-anchor="end">172 / 172</text>

    <text x="24" y="140" class="sans label">GSD</text>
    <rect x="180" y="128" width="300" height="22" rx="11" fill="#11161c" stroke="#30363d" stroke-width="1"/>
    <rect x="180" y="128" width="213" height="22" rx="11" fill="#58a6ff"/>
    <text x="492" y="144" class="sans value" text-anchor="end">122 / 172</text>

    <text x="24" y="176" class="sans label">Superpowers</text>
    <rect x="180" y="164" width="300" height="22" rx="11" fill="#11161c" stroke="#30363d" stroke-width="1"/>
    <rect x="180" y="164" width="218" height="22" rx="11" fill="#d29922"/>
    <text x="492" y="180" class="sans value" text-anchor="end">125 / 172</text>

    <text x="24" y="208" class="sans small">Scenarios H through L and resume pressure. Same visible ask, harder carryover truth.</text>
  </g>

  <!-- Bottom row -->
  <g transform="translate(40, 440)">
    <rect width="540" height="240" rx="12" fill="url(#amberFill)" stroke="#d29922" stroke-width="1.4" filter="url(#shadow)"/>
    <text x="24" y="36" class="sans cardKick" fill="#d29922">Planning ambiguity</text>
    <text x="24" y="64" class="sans cardTitle">Competitive, not blanket best.</text>

    <text x="40" y="110" class="sans label">Scenario B stage score</text>

    <rect x="60" y="138" width="96" height="116" rx="10" fill="#11161c" stroke="#30363d" stroke-width="1"/>
    <rect x="84" y="172" width="48" height="58" rx="8" fill="#3fb950"/>
    <text x="108" y="164" class="sans value" text-anchor="middle">3 / 3</text>
    <text x="108" y="274" class="sans small" text-anchor="middle">PE</text>

    <rect x="188" y="138" width="96" height="116" rx="10" fill="#11161c" stroke="#30363d" stroke-width="1"/>
    <rect x="212" y="191" width="48" height="39" rx="8" fill="#58a6ff"/>
    <text x="236" y="183" class="sans value" text-anchor="middle">2 / 3</text>
    <text x="236" y="274" class="sans small" text-anchor="middle">GSD</text>

    <rect x="316" y="138" width="96" height="116" rx="10" fill="#11161c" stroke="#30363d" stroke-width="1"/>
    <rect x="340" y="191" width="48" height="39" rx="8" fill="#d29922"/>
    <text x="364" y="183" class="sans value" text-anchor="middle">2 / 3</text>
    <text x="364" y="274" class="sans small" text-anchor="middle">SP</text>

    <text x="40" y="314" class="sans small">Interpretation, plan, review under an ambiguity trap.</text>
    <text x="40" y="332" class="sans small">Fair claim: competitive authorship chain, not universal planning win.</text>
  </g>

  <g transform="translate(620, 440)">
    <rect width="540" height="240" rx="12" fill="url(#purpleFill)" stroke="#8957e5" stroke-width="1.4" filter="url(#shadow)"/>
    <text x="24" y="36" class="sans cardKick" fill="#8957e5">Large trust runtime</text>
    <text x="24" y="64" class="sans cardTitle">Large phased work stays respectable.</text>

    <text x="24" y="108" class="sans label">Lower is better</text>

    <text x="24" y="144" class="sans label">Plan Enforcer</text>
    <rect x="170" y="132" width="300" height="18" rx="9" fill="#11161c" stroke="#30363d" stroke-width="1"/>
    <rect x="170" y="132" width="223" height="18" rx="9" fill="#3fb950"/>
    <text x="486" y="146" class="sans value" text-anchor="end">92m 52s</text>

    <text x="24" y="176" class="sans label">GSD</text>
    <rect x="170" y="164" width="300" height="18" rx="9" fill="#11161c" stroke="#30363d" stroke-width="1"/>
    <rect x="170" y="164" width="280" height="18" rx="9" fill="#58a6ff"/>
    <text x="486" y="178" class="sans value" text-anchor="end">116m 49s</text>

    <text x="24" y="208" class="sans label">Superpowers</text>
    <rect x="170" y="196" width="300" height="18" rx="9" fill="#11161c" stroke="#30363d" stroke-width="1"/>
    <rect x="170" y="196" width="300" height="18" rx="9" fill="#d29922"/>
    <text x="486" y="210" class="sans value" text-anchor="end">125m 06s</text>

    <text x="24" y="246" class="sans big">98 / 98</text>
    <text x="140" y="246" class="sans small">for all three on the 14-phase trust pack</text>
    <text x="24" y="278" class="sans small">Large scale proves PE can run. Carryover proves why it matters.</text>
  </g>

  <text x="60" y="726" class="sans footer">Read the proof docs for details. The README should only show the shape of the truth.</text>
</svg>
