<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 720 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Five fit dimensions scored as horizontal bars: a strong-fit profile fills every bar, a less-suited profile leaves them empty.">
  <rect width="720" height="360" fill="#0b0d10"/>

  <g font-family="ui-monospace,Menlo,Consolas,monospace" font-size="10" letter-spacing="3">
    <text x="20" y="20" fill="#1aadd9">BEST FIT . FIVE DIMENSIONS</text>
    <text x="700" y="20" text-anchor="end" fill="#6f7a8c">EMPTY = NOT FOR YOU</text>
  </g>

  <g font-family="ui-monospace,Menlo,Consolas,monospace" font-size="9" letter-spacing="3">
    <text x="200" y="50" fill="#1aadd9">STRONG FIT</text>
    <text x="460" y="50" fill="#6f7a8c">LESS SUITED</text>
  </g>
  <line x1="20" y1="58" x2="700" y2="58" stroke="#2a2f38" stroke-width="1"/>

  <g font-family="ui-monospace,Menlo,Consolas,monospace">
    <g transform="translate(0,72)">
      <text x="20" y="14" font-size="11" letter-spacing="2" fill="#d8e1ec">DURATION</text>
      <text x="20" y="30" font-size="9" fill="#6f7a8c">long-running vs one-shot</text>
      <rect x="180" y="6" width="220" height="14" fill="#14171c" stroke="#2a2f38"/>
      <rect x="180" y="6" width="200" height="14" fill="#1aadd9"/>
      <rect x="440" y="6" width="220" height="14" fill="#14171c" stroke="#2a2f38"/>
      <rect x="440" y="6" width="22" height="14" fill="#6f7a8c"/>
    </g>
    <g transform="translate(0,122)">
      <text x="20" y="14" font-size="11" letter-spacing="2" fill="#d8e1ec">RISK</text>
      <text x="20" y="30" font-size="9" fill="#6f7a8c">migrations, auth, infra</text>
      <rect x="180" y="6" width="220" height="14" fill="#14171c" stroke="#2a2f38"/>
      <rect x="180" y="6" width="210" height="14" fill="#1aadd9"/>
      <rect x="440" y="6" width="220" height="14" fill="#14171c" stroke="#2a2f38"/>
      <rect x="440" y="6" width="14" height="14" fill="#6f7a8c"/>
    </g>
    <g transform="translate(0,172)">
      <text x="20" y="14" font-size="11" letter-spacing="2" fill="#d8e1ec">AUDITABILITY</text>
      <text x="20" y="30" font-size="9" fill="#6f7a8c">regulated, scrutiny-bound</text>
      <rect x="180" y="6" width="220" height="14" fill="#14171c" stroke="#2a2f38"/>
      <rect x="180" y="6" width="218" height="14" fill="#3ec07a"/>
      <rect x="440" y="6" width="220" height="14" fill="#14171c" stroke="#2a2f38"/>
      <rect x="440" y="6" width="6" height="14" fill="#6f7a8c"/>
    </g>
    <g transform="translate(0,222)">
      <text x="20" y="14" font-size="11" letter-spacing="2" fill="#d8e1ec">HANDOFF</text>
      <text x="20" y="30" font-size="9" fill="#6f7a8c">resumes, context loss, rotations</text>
      <rect x="180" y="6" width="220" height="14" fill="#14171c" stroke="#2a2f38"/>
      <rect x="180" y="6" width="190" height="14" fill="#1aadd9"/>
      <rect x="440" y="6" width="220" height="14" fill="#14171c" stroke="#2a2f38"/>
      <rect x="440" y="6" width="30" height="14" fill="#6f7a8c"/>
    </g>
    <g transform="translate(0,272)">
      <text x="20" y="14" font-size="11" letter-spacing="2" fill="#d8e1ec">EVIDENCE NEED</text>
      <text x="20" y="30" font-size="9" fill="#6f7a8c">teams that need proof, not output</text>
      <rect x="180" y="6" width="220" height="14" fill="#14171c" stroke="#2a2f38"/>
      <rect x="180" y="6" width="216" height="14" fill="#3ec07a"/>
      <rect x="440" y="6" width="220" height="14" fill="#14171c" stroke="#2a2f38"/>
      <rect x="440" y="6" width="10" height="14" fill="#6f7a8c"/>
    </g>
  </g>

  <line x1="20" y1="318" x2="700" y2="318" stroke="#2a2f38" stroke-width="1"/>
  <g font-family="ui-monospace,Menlo,Consolas,monospace" font-size="10" letter-spacing="3">
    <text x="20" y="338" fill="#6f7a8c">FILL = YOU PAY THE COST OF CUSTODY ANYWAY</text>
  </g>
</svg>
