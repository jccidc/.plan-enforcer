<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 960 380" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Before and after contrast: on the left, a wavy drift line shows an ask that slides into a vague landed state; on the right, five crisp stage pills (ask, plan, exec, verify, land) connect in a clean chain.">
  <rect width="960" height="380" fill="#0b0d10"/>

  <!-- center divider -->
  <line x1="480" y1="24" x2="480" y2="356" stroke="#2a2f38" stroke-width="1" stroke-dasharray="2 6"/>

  <!-- LEFT: WITHOUT / Drift compounds -->
  <g font-family="ui-monospace,Menlo,Consolas,monospace">
    <text x="32" y="42" font-size="10" letter-spacing="3" fill="#6f7a8c">WITHOUT</text>
    <text x="32" y="84" font-family="ui-sans-serif,system-ui,sans-serif" font-size="28" font-weight="700" fill="#d8e1ec">Drift compounds.</text>

    <!-- ask marker -->
    <circle cx="60" cy="160" r="5" fill="#d8e1ec"/>
    <text x="60" y="146" text-anchor="middle" font-size="10" letter-spacing="2" fill="#6f7a8c">ask</text>

    <!-- wavy drift line from ask (60,160) to landed (440,250) -->
    <path d="M60 160 C 120 160, 150 120, 200 140 S 280 210, 320 190 S 380 260, 440 250"
          fill="none" stroke="#e0b04a" stroke-width="2" opacity="0.9"/>

    <!-- dashed reference rail so drift has something to drift from -->
    <line x1="60" y1="160" x2="440" y2="160" stroke="#2a2f38" stroke-width="1" stroke-dasharray="3 5"/>

    <!-- landed marker (open circle -- no receipt) -->
    <circle cx="440" cy="250" r="6" fill="none" stroke="#e0b04a" stroke-width="1.5"/>
    <text x="440" y="274" text-anchor="middle" font-size="10" letter-spacing="2" fill="#6f7a8c">landed?</text>

    <!-- bullets -->
    <g font-size="12" fill="#6f7a8c">
      <text x="32" y="322"><tspan fill="#e0b04a">*</tspan>  scope silently narrows</text>
      <text x="32" y="340"><tspan fill="#e0b04a">*</tspan>  decisions unrecorded</text>
      <text x="32" y="358"><tspan fill="#e0b04a">*</tspan>  resume from stale context</text>
    </g>
  </g>

  <!-- RIGHT: WITH PLAN ENFORCER / Fidelity preserved -->
  <g font-family="ui-monospace,Menlo,Consolas,monospace">
    <text x="512" y="42" font-size="10" letter-spacing="3" fill="#3ec07a">WITH PLAN ENFORCER</text>
    <text x="512" y="84" font-family="ui-sans-serif,system-ui,sans-serif" font-size="28" font-weight="700" fill="#d8e1ec">Fidelity preserved.</text>

    <!-- 5 pills connected by double rails -->
    <g>
      <!-- ASK pill -->
      <rect x="512" y="148" width="64" height="26" fill="#14171c" stroke="#1aadd9" stroke-width="1.5"/>
      <text x="544" y="166" text-anchor="middle" font-size="10" letter-spacing="3" fill="#1aadd9">ASK</text>

      <!-- rail to PLAN -->
      <line x1="576" y1="157" x2="604" y2="157" stroke="#1aadd9" stroke-width="1"/>
      <line x1="576" y1="165" x2="604" y2="165" stroke="#1aadd9" stroke-width="1"/>

      <!-- PLAN -->
      <rect x="604" y="148" width="64" height="26" fill="#14171c" stroke="#1aadd9" stroke-width="1.5"/>
      <text x="636" y="166" text-anchor="middle" font-size="10" letter-spacing="3" fill="#1aadd9">PLAN</text>

      <line x1="668" y1="157" x2="696" y2="157" stroke="#1aadd9" stroke-width="1"/>
      <line x1="668" y1="165" x2="696" y2="165" stroke="#1aadd9" stroke-width="1"/>

      <!-- EXEC -->
      <rect x="696" y="148" width="64" height="26" fill="#14171c" stroke="#1aadd9" stroke-width="1.5"/>
      <text x="728" y="166" text-anchor="middle" font-size="10" letter-spacing="3" fill="#1aadd9">EXEC</text>

      <line x1="760" y1="157" x2="788" y2="157" stroke="#1aadd9" stroke-width="1"/>
      <line x1="760" y1="165" x2="788" y2="165" stroke="#1aadd9" stroke-width="1"/>

      <!-- VERIFY -->
      <rect x="788" y="148" width="64" height="26" fill="#14171c" stroke="#1aadd9" stroke-width="1.5"/>
      <text x="820" y="166" text-anchor="middle" font-size="10" letter-spacing="3" fill="#1aadd9">VERIFY</text>

      <line x1="852" y1="157" x2="880" y2="157" stroke="#3ec07a" stroke-width="1"/>
      <line x1="852" y1="165" x2="880" y2="165" stroke="#3ec07a" stroke-width="1"/>

      <!-- LAND (green, closed) -->
      <rect x="880" y="148" width="64" height="26" fill="#14171c" stroke="#3ec07a" stroke-width="2"/>
      <text x="912" y="166" text-anchor="middle" font-size="10" letter-spacing="3" fill="#3ec07a">LAND</text>
    </g>

    <!-- tiny caption under chain -->
    <text x="512" y="200" font-size="10" letter-spacing="2" fill="#6f7a8c">every step named . every decision typed . every close receipted</text>

    <!-- bullets -->
    <g font-size="12" fill="#6f7a8c">
      <text x="512" y="322"><tspan fill="#3ec07a">*</tspan>  ledger kept on disk</text>
      <text x="512" y="340"><tspan fill="#3ec07a">*</tspan>  decisions tracked by design</text>
      <text x="512" y="358"><tspan fill="#3ec07a">*</tspan>  resume is first-class</text>
    </g>
  </g>
</svg>
