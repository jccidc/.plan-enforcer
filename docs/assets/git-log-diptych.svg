<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 960 540" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Git log diptych: without Plan Enforcer the log says nothing; with Plan Enforcer every commit is a ledger row">
  <defs>
    <pattern id="gridg" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M24 0H0V24" fill="none" stroke="rgba(237,228,211,.04)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="960" height="540" fill="#141211"/>
  <rect width="960" height="540" fill="url(#gridg)"/>

  <rect x="0" y="0" width="960" height="30" fill="#141211"/>
  <rect x="0" y="30" width="960" height="2" fill="#c9342a"/>
  <g font-family="ui-monospace,Menlo,Consolas,monospace" font-size="10" letter-spacing="3">
    <text x="20" y="20" fill="#c9342a">CASE PE-0427</text>
    <text x="480" y="20" text-anchor="middle" fill="#ede4d3">EXHIBIT B - GIT LOG, BEFORE AND AFTER</text>
    <text x="940" y="20" text-anchor="end" fill="#c9bfa8">FIG. 09</text>
  </g>

  <g font-family="ui-monospace,Menlo,Consolas,monospace">
    <text x="30" y="58" font-size="11" letter-spacing="4" fill="#c9342a">WITHOUT - LOG SAYS NOTHING</text>
    <text x="30" y="80" font-family="ui-sans-serif,system-ui,sans-serif" font-size="16" font-weight="700" fill="#ede4d3">Same week of work. No reviewable surface.</text>

    <text x="490" y="58" font-size="11" letter-spacing="4" fill="#7de38a">WITH PLAN ENFORCER - LOG TELLS THE STORY</text>
    <text x="490" y="80" font-family="ui-sans-serif,system-ui,sans-serif" font-size="16" font-weight="700" fill="#ede4d3">Same week of work. Every commit is a ledger row.</text>
  </g>

  <g transform="translate(30,100)">
    <rect width="440" height="350" fill="#1d1a18" stroke="rgba(237,228,211,.12)"/>
    <rect width="440" height="22" fill="#0b0a09"/>
    <circle cx="14" cy="11" r="4" fill="#c9342a"/>
    <circle cx="28" cy="11" r="4" fill="#3d3224"/>
    <circle cx="42" cy="11" r="4" fill="#3d3224"/>
    <text x="220" y="15" text-anchor="middle" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="10" letter-spacing="2" fill="#c9bfa8">~/repo - bash</text>

    <g font-family="ui-monospace,Menlo,Consolas,monospace" font-size="11">
      <text x="14" y="44" fill="#c9bfa8">$ git log --oneline -8</text>
      <text x="14" y="78" fill="#f0a500">1c2b3d4</text><text x="84" y="78" fill="#ede4d3">ok done</text>
      <text x="14" y="100" fill="#f0a500">e44d1a8</text><text x="84" y="100" fill="#ede4d3">revert "actually fix"</text>
      <text x="14" y="122" fill="#f0a500">2af7b09</text><text x="84" y="122" fill="#ede4d3">actually fix this time</text>
      <text x="14" y="144" fill="#f0a500">9c0d2e1</text><text x="84" y="144" fill="#ede4d3">more</text>
      <text x="14" y="166" fill="#f0a500">b1e8a44</text><text x="84" y="166" fill="#ede4d3">fix</text>
      <text x="14" y="188" fill="#f0a500">a3f2c1d</text><text x="84" y="188" fill="#ede4d3">wip</text>
      <text x="14" y="210" fill="#f0a500">0aa9712</text><text x="84" y="210" fill="#ede4d3">update</text>
      <text x="14" y="232" fill="#f0a500">fd33c20</text><text x="84" y="232" fill="#ede4d3">stuff</text>

      <text x="14" y="266" fill="#c9bfa8">$ git show 1c2b3d4 --stat</text>
      <text x="14" y="288" fill="#c9342a">  src/auth.ts        | 142 +++++-----</text>
      <text x="14" y="306" fill="#c9342a">  tests/auth.test.js |  38 +++++</text>
      <text x="14" y="324" fill="#c9342a">  why? scope? plan?  | (no record)</text>
    </g>

    <line x1="14" y1="338" x2="426" y2="338" stroke="rgba(201,52,42,.4)" stroke-dasharray="2 4"/>
  </g>

  <g transform="translate(30,452)" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="10" letter-spacing="2">
    <rect width="440" height="22" fill="#0b0a09" stroke="#c9342a"/>
    <text x="12" y="15" fill="#c9342a">8 COMMITS</text>
    <text x="160" y="15" fill="#c9bfa8">REVIEWABLE: 0</text>
    <text x="300" y="15" fill="#c9bfa8">AUDIT TRAIL: NONE</text>
  </g>

  <g transform="translate(490,100)">
    <rect width="440" height="350" fill="#1d1a18" stroke="rgba(125,227,138,.25)"/>
    <rect width="440" height="22" fill="#0b0a09"/>
    <circle cx="14" cy="11" r="4" fill="#7de38a"/>
    <circle cx="28" cy="11" r="4" fill="#3d3224"/>
    <circle cx="42" cy="11" r="4" fill="#3d3224"/>
    <text x="220" y="15" text-anchor="middle" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="10" letter-spacing="2" fill="#c9bfa8">~/repo - bash</text>

    <g font-family="ui-monospace,Menlo,Consolas,monospace" font-size="11">
      <text x="14" y="44" fill="#c9bfa8">$ git log --oneline -8</text>

      <text x="14" y="78" fill="#7de38a">7a9c1ee</text>
      <text x="84" y="78" fill="#7de38a" font-weight="700">[SEALED]</text>
      <text x="160" y="78" fill="#ede4d3">PE-04 closure: repo sha matches plan</text>

      <text x="14" y="100" fill="#7de38a">4d2b88f</text>
      <text x="84" y="100" fill="#7de38a" font-weight="700">[VERIFY]</text>
      <text x="160" y="100" fill="#ede4d3">PE-04 23/23 rows, gate=PASS</text>

      <text x="14" y="122" fill="#7de38a">8e1f902</text>
      <text x="84" y="122" fill="#f0a500" font-weight="700">[DECIDE]</text>
      <text x="160" y="122" fill="#ede4d3">PE-04 row 11 scope delta + reason</text>

      <text x="14" y="144" fill="#7de38a">c5a7d31</text>
      <text x="84" y="144" fill="#f0a500" font-weight="700">[EXEC]</text>
      <text x="160" y="144" fill="#ede4d3">PE-04 row 11 tests/auth.test.js</text>

      <text x="14" y="166" fill="#7de38a">9b8e201</text>
      <text x="84" y="166" fill="#f0a500" font-weight="700">[EXEC]</text>
      <text x="160" y="166" fill="#ede4d3">PE-04 row 04 src/handlers/auth.ts</text>

      <text x="14" y="188" fill="#7de38a">2f1c0a4</text>
      <text x="84" y="188" fill="#6ab0ff" font-weight="700">[SIGNED]</text>
      <text x="160" y="188" fill="#ede4d3">PE-04 plan: 23 rows, 4 gates frozen</text>

      <text x="14" y="210" fill="#7de38a">3d9e5b8</text>
      <text x="84" y="210" fill="#6ab0ff" font-weight="700">[FILED]</text>
      <text x="160" y="210" fill="#ede4d3">PE-04 ask.md captured (sha256)</text>

      <text x="14" y="232" fill="#7de38a">0aa9712</text>
      <text x="84" y="232" fill="#c9bfa8">main:</text>
      <text x="160" y="232" fill="#c9bfa8">prior baseline</text>

      <text x="14" y="266" fill="#c9bfa8">$ git show 7a9c1ee --stat</text>
      <text x="14" y="288" fill="#7de38a">  src/handlers/auth.ts | 142 +++++-----</text>
      <text x="14" y="306" fill="#7de38a">  tests/auth.test.js   |  38 +++++</text>
      <text x="14" y="324" fill="#7de38a">  .plan-enforcer/closure.md | row -> file</text>
    </g>

    <line x1="14" y1="338" x2="426" y2="338" stroke="rgba(125,227,138,.4)" stroke-dasharray="2 4"/>
  </g>

  <g transform="translate(490,452)" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="10" letter-spacing="2">
    <rect width="440" height="22" fill="#0b0a09" stroke="#7de38a"/>
    <text x="12" y="15" fill="#7de38a">8 COMMITS</text>
    <text x="160" y="15" fill="#7de38a">REVIEWABLE: 8</text>
    <text x="300" y="15" fill="#7de38a">AUDIT TRAIL: ledger.md</text>
  </g>

  <line x1="480" y1="92" x2="480" y2="486" stroke="#c9342a" stroke-dasharray="2 6" opacity=".5"/>
  <rect x="456" y="266" width="48" height="20" fill="#0b0a09"/>
  <text x="480" y="280" text-anchor="middle" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="10" letter-spacing="3" fill="#c9342a">VS</text>

  <g transform="translate(0,500)">
    <text x="30" y="14" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="9" letter-spacing="3" fill="#c9bfa8">SAME WORK . SAME WEEK . SAME REPO</text>
    <text x="930" y="14" text-anchor="end" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="9" letter-spacing="3" fill="#7de38a">DIFFERENCE: A LEDGER ON DISK</text>
  </g>

  <g transform="translate(850,528)">
    <rect x="-70" y="-12" width="140" height="20" fill="none" stroke="#c9342a" stroke-width="1.5"/>
    <text x="0" y="3" text-anchor="middle" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="9" letter-spacing="4" fill="#c9342a" font-weight="700">SEALED . PE-0427</text>
  </g>
</svg>
