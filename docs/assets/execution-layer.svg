<svg width="1200" height="520" viewBox="0 0 1200 520" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Plan Enforcer execution layer</title>
  <desc id="desc">Execution layer showing phase-first runtime, ledger, tier dial, and resume continuity.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="520" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="cardFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#182842"/>
      <stop offset="1" stop-color="#1c2128"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.38"/>
    </filter>
    <style>
      .sans { font-family: "IBM Plex Sans", "Segoe UI", Arial, sans-serif; }
      .eyebrow { font-size: 13px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; fill: #8b949e; }
      .title { font-size: 28px; font-weight: 700; letter-spacing: -0.02em; fill: #e6edf3; }
      .subtitle { font-size: 14px; font-weight: 500; fill: #8b949e; }
      .kick { font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; fill: #58a6ff; }
      .cardTitle { font-size: 19px; font-weight: 700; fill: #e6edf3; }
      .body { font-size: 12px; font-weight: 500; fill: #c9d1d9; }
      .small { font-size: 11px; font-weight: 500; fill: #8b949e; }
      .footer { font-size: 11px; font-weight: 500; fill: #6e7681; }
    </style>
  </defs>

  <rect width="1200" height="520" fill="url(#bg)"/>

  <text x="60" y="54" class="sans eyebrow">Plan Enforcer / Execution layer</text>
  <text x="60" y="90" class="sans title">Runtime is phase-first, bounded, and restartable.</text>
  <text x="60" y="118" class="sans subtitle">Execution is not one giant prompt gamble. The runtime works in phases, keeps a single on-disk ledger, and resumes from what the repo says is true.</text>

  <g transform="translate(40, 184)">
    <rect width="250" height="220" rx="12" fill="url(#cardFill)" stroke="#58a6ff" stroke-width="1.4" filter="url(#shadow)"/>
    <text x="22" y="36" class="sans kick">Plan source</text>
    <text x="22" y="64" class="sans cardTitle">Start from a real plan</text>
    <text x="22" y="96" class="sans body">Native plan, imported plan,</text>
    <text x="22" y="114" class="sans body">or reviewed checklist. Runtime</text>
    <text x="22" y="132" class="sans body">does not start from pure chat.</text>
  </g>

  <g transform="translate(330, 184)">
    <rect width="250" height="220" rx="12" fill="url(#cardFill)" stroke="#58a6ff" stroke-width="1.4" filter="url(#shadow)"/>
    <text x="22" y="36" class="sans kick">Phase-first</text>
    <text x="22" y="64" class="sans cardTitle">Bound the work</text>
    <text x="22" y="96" class="sans body">Large work runs in phases with</text>
    <text x="22" y="114" class="sans body">clear tasks, outputs, and verifier</text>
    <text x="22" y="132" class="sans body">pressure at phase boundaries.</text>
  </g>

  <g transform="translate(620, 184)">
    <rect width="250" height="220" rx="12" fill="url(#cardFill)" stroke="#58a6ff" stroke-width="1.4" filter="url(#shadow)"/>
    <text x="22" y="36" class="sans kick">Ledger</text>
    <text x="22" y="64" class="sans cardTitle">One file, shared truth</text>
    <text x="22" y="96" class="sans body">`.plan-enforcer/ledger.md` keeps</text>
    <text x="22" y="114" class="sans body">task rows, evidence, chain refs,</text>
    <text x="22" y="132" class="sans body">and completion state on disk.</text>
  </g>

  <g transform="translate(910, 184)">
    <rect width="250" height="220" rx="12" fill="url(#cardFill)" stroke="#58a6ff" stroke-width="1.4" filter="url(#shadow)"/>
    <text x="22" y="36" class="sans kick">Continuity</text>
    <text x="22" y="64" class="sans cardTitle">Crash and resume cleanly</text>
    <text x="22" y="96" class="sans body">SessionStart rehydrates the right</text>
    <text x="22" y="114" class="sans body">state. Structural and enforced tiers</text>
    <text x="22" y="132" class="sans body">block hard integrity breaks.</text>
  </g>

  <path d="M290 294 H330" stroke="#58a6ff" stroke-width="2" stroke-linecap="round"/>
  <path d="M580 294 H620" stroke="#58a6ff" stroke-width="2" stroke-linecap="round"/>
  <path d="M870 294 H910" stroke="#58a6ff" stroke-width="2" stroke-linecap="round"/>

  <text x="60" y="486" class="sans footer">Execution credibility matters. The moat shows up after mutation, resume, and closure pressure.</text>
</svg>
