<svg width="1200" height="480" viewBox="0 0 1200 480" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Plan Enforcer execution layer</title>
  <desc id="desc">Execution layer showing phase-first runtime, ledger, and resume continuity.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="480" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#201f1e"/>
      <stop offset="1" stop-color="#f7f7f7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#617e94" flood-opacity="0.4"/>
    </filter>
    <style>
      .sans { font-family: "IBM Plex Sans", "Segoe UI", Arial, sans-serif; }
      .mono { font-family: "IBM Plex Mono", "Cascadia Code", Consolas, monospace; }
      .eyebrow { font-size: 13px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; fill: #ecf6f9; }
      .title { font-size: 26px; font-weight: 700; letter-spacing: -0.02em; fill: #617e94; }
      .subtitle { font-size: 14px; font-weight: 500; fill: #ecf6f9; }
      .step-num { font-size: 11px; font-weight: 700; fill: #395984; letter-spacing: 0.1em; text-transform: uppercase; }
      .step-title { font-size: 15px; font-weight: 700; fill: #617e94; }
      .step-sub { font-size: 11px; font-weight: 500; fill: #ecf6f9; }
      .step-cmd { font-size: 11px; font-weight: 600; fill: #395984; }
      .card { fill: #f7f7f7; stroke: #ecf6f9; stroke-width: 1.5; }
      .card-active { fill: #f7f7f7; stroke: #395984; stroke-width: 1.5; }
      .arrow { fill: none; stroke: #ecf6f9; stroke-width: 2; }
      .arrowhead { fill: #ecf6f9; }
      .footer { font-size: 11px; font-weight: 500; fill: #ecf6f9; }
    </style>
    <marker id="arrow-end" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" class="arrowhead"/>
    </marker>
  </defs>

  <rect width="1200" height="480" fill="url(#bg)"/>

  <text x="60" y="54" class="sans eyebrow">Execution layer</text>
  <text x="60" y="84" class="sans title">Phase-first, bounded, restartable.</text>
  <text x="60" y="108" class="sans subtitle">Single on-disk ledger, cheap live guards, clean crash-and-resume.</text>

  <g transform="translate(40, 150)">
    <rect width="250" height="210" rx="10" class="card" filter="url(#shadow)"/>
    <text x="20" y="32" class="sans step-num">Source</text>
    <text x="20" y="58" class="sans step-title">Plan source</text>
    <text x="20" y="78" class="sans step-title">Start from a real plan</text>
    <line x1="20" y1="92" x2="230" y2="92" stroke="#ecf6f9" stroke-width="1"/>
    <text x="20" y="116" class="sans step-sub">Native, imported, or</text>
    <text x="20" y="134" class="sans step-sub">reviewed checklist. Never</text>
    <text x="20" y="152" class="sans step-sub">pure chat.</text>
    <text x="20" y="190" class="mono step-cmd">docs/plans/*.md</text>
  </g>

  <g transform="translate(330, 150)">
    <rect width="250" height="210" rx="10" class="card-active" filter="url(#shadow)"/>
    <text x="20" y="32" class="sans step-num">Phase-first</text>
    <text x="20" y="58" class="sans step-title">Bound the work</text>
    <text x="20" y="78" class="sans step-title">Clear tasks and outputs</text>
    <line x1="20" y1="92" x2="230" y2="92" stroke="#ecf6f9" stroke-width="1"/>
    <text x="20" y="116" class="sans step-sub">Large work runs in phases</text>
    <text x="20" y="134" class="sans step-sub">with verifier pressure at</text>
    <text x="20" y="152" class="sans step-sub">each phase boundary.</text>
    <text x="20" y="190" class="mono step-cmd">phase-verify</text>
  </g>

  <g transform="translate(620, 150)">
    <rect width="250" height="210" rx="10" class="card" filter="url(#shadow)"/>
    <text x="20" y="32" class="sans step-num">Ledger</text>
    <text x="20" y="58" class="sans step-title">One file, shared truth</text>
    <text x="20" y="78" class="sans step-title">Task + evidence + chain</text>
    <line x1="20" y1="92" x2="230" y2="92" stroke="#ecf6f9" stroke-width="1"/>
    <text x="20" y="116" class="sans step-sub">Task rows, evidence, chain</text>
    <text x="20" y="134" class="sans step-sub">refs, completion state.</text>
    <text x="20" y="152" class="sans step-sub">Human and machine readable.</text>
    <text x="20" y="190" class="mono step-cmd">.plan-enforcer/ledger.md</text>
  </g>

  <g transform="translate(910, 150)">
    <rect width="250" height="210" rx="10" class="card" filter="url(#shadow)"/>
    <text x="20" y="32" class="sans step-num">Continuity</text>
    <text x="20" y="58" class="sans step-title">Crash and resume</text>
    <text x="20" y="78" class="sans step-title">Rehydrate on SessionStart</text>
    <line x1="20" y1="92" x2="230" y2="92" stroke="#ecf6f9" stroke-width="1"/>
    <text x="20" y="116" class="sans step-sub">Structural and enforced</text>
    <text x="20" y="134" class="sans step-sub">tiers block hard integrity</text>
    <text x="20" y="152" class="sans step-sub">breaks.</text>
    <text x="20" y="190" class="mono step-cmd">SessionStart hook</text>
  </g>

  <path d="M 292 255 L 328 255" class="arrow" marker-end="url(#arrow-end)"/>
  <path d="M 582 255 L 618 255" class="arrow" marker-end="url(#arrow-end)"/>
  <path d="M 872 255 L 908 255" class="arrow" marker-end="url(#arrow-end)"/>

  <text x="60" y="450" class="sans footer">Execution has to be credible. The moat shows up after mutation and resume pressure.</text>
</svg>
