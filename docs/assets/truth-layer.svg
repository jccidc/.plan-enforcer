<svg width="1200" height="520" viewBox="0 0 1200 520" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Plan Enforcer truth layer</title>
  <desc id="desc">Truth layer showing verify, audit, report, chain of custody, ask-fidelity, carryover, and final closure.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="520" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="cardFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#112a18"/>
      <stop offset="1" stop-color="#1c2128"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.38"/>
    </filter>
    <style>
      .sans { font-family: "IBM Plex Sans", "Segoe UI", Arial, sans-serif; }
      .eyebrow { font-size: 13px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; fill: #8b949e; }
      .title { font-size: 28px; font-weight: 700; letter-spacing: -0.02em; fill: #e6edf3; }
      .subtitle { font-size: 14px; font-weight: 500; fill: #8b949e; }
      .kick { font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; fill: #3fb950; }
      .cardTitle { font-size: 19px; font-weight: 700; fill: #e6edf3; }
      .body { font-size: 12px; font-weight: 500; fill: #c9d1d9; }
      .small { font-size: 11px; font-weight: 500; fill: #8b949e; }
      .footer { font-size: 11px; font-weight: 500; fill: #6e7681; }
    </style>
  </defs>

  <rect width="1200" height="520" fill="url(#bg)"/>

  <text x="60" y="54" class="sans eyebrow">Plan Enforcer / Truth layer</text>
  <text x="60" y="90" class="sans title">This is where "done" stops being self-report.</text>
  <text x="60" y="118" class="sans subtitle">Verify, audit, and report turn the ledger into cold-reviewable proof. Ask-fidelity, carryover, lineage, and final closure all live in the same lane.</text>

  <g transform="translate(40, 184)">
    <rect width="250" height="220" rx="12" fill="url(#cardFill)" stroke="#3fb950" stroke-width="1.4" filter="url(#shadow)"/>
    <text x="22" y="36" class="sans kick">Verify</text>
    <text x="22" y="64" class="sans cardTitle">Proof before closure</text>
    <text x="22" y="96" class="sans body">Verified rows must point at real</text>
    <text x="22" y="114" class="sans body">checks, not just optimistic notes.</text>
    <text x="22" y="132" class="sans body">Ask-fidelity pressure starts here.</text>
  </g>

  <g transform="translate(330, 184)">
    <rect width="250" height="220" rx="12" fill="url(#cardFill)" stroke="#3fb950" stroke-width="1.4" filter="url(#shadow)"/>
    <text x="22" y="36" class="sans kick">Audit</text>
    <text x="22" y="64" class="sans cardTitle">Interrogate the run</text>
    <text x="22" y="96" class="sans body">Trace tasks, files, deviations,</text>
    <text x="22" y="114" class="sans body">orphan edits, and missing proof</text>
    <text x="22" y="132" class="sans body">without trusting the agent summary.</text>
  </g>

  <g transform="translate(620, 184)">
    <rect width="250" height="220" rx="12" fill="url(#cardFill)" stroke="#3fb950" stroke-width="1.4" filter="url(#shadow)"/>
    <text x="22" y="36" class="sans kick">Report</text>
    <text x="22" y="64" class="sans cardTitle">Make the truth readable</text>
    <text x="22" y="96" class="sans body">Phase reports, lineage, dossier,</text>
    <text x="22" y="114" class="sans body">closure manifest, and final-truth</text>
    <text x="22" y="132" class="sans body">summary are product surfaces.</text>
  </g>

  <g transform="translate(910, 184)">
    <rect width="250" height="220" rx="12" fill="url(#cardFill)" stroke="#3fb950" stroke-width="1.4" filter="url(#shadow)"/>
    <text x="22" y="36" class="sans kick">Chain of custody</text>
    <text x="22" y="64" class="sans cardTitle">Cold-reviewable closure</text>
    <text x="22" y="96" class="sans body">Every meaningful change traces to</text>
    <text x="22" y="114" class="sans body">a task row or typed decision row.</text>
    <text x="22" y="132" class="sans body">That is the moat under carryover.</text>
  </g>

  <path d="M290 294 H330" stroke="#3fb950" stroke-width="2" stroke-linecap="round"/>
  <path d="M580 294 H620" stroke="#3fb950" stroke-width="2" stroke-linecap="round"/>
  <path d="M870 294 H910" stroke="#3fb950" stroke-width="2" stroke-linecap="round"/>

  <text x="60" y="486" class="sans footer">Public benchmark language should map back to this layer: ask-fidelity, carryover, lineage, and final truth.</text>
</svg>
