<svg width="1200" height="520" viewBox="0 0 1200 520" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Plan Enforcer authorship layer</title>
  <desc id="desc">Authorship layer showing discuss, draft, review, and bring your own plan in the same public visual theme.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="520" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="cardFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2a2010"/>
      <stop offset="1" stop-color="#1c2128"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.38"/>
    </filter>
    <style>
      .sans { font-family: "IBM Plex Sans", "Segoe UI", Arial, sans-serif; }
      .eyebrow { font-size: 13px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; fill: #8b949e; }
      .title { font-size: 28px; font-weight: 700; letter-spacing: -0.02em; fill: #e6edf3; }
      .subtitle { font-size: 14px; font-weight: 500; fill: #8b949e; }
      .kick { font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; fill: #d29922; }
      .cardTitle { font-size: 19px; font-weight: 700; fill: #e6edf3; }
      .body { font-size: 12px; font-weight: 500; fill: #c9d1d9; }
      .small { font-size: 11px; font-weight: 500; fill: #8b949e; }
      .footer { font-size: 11px; font-weight: 500; fill: #6e7681; }
    </style>
  </defs>

  <rect width="1200" height="520" fill="url(#bg)"/>

  <text x="60" y="54" class="sans eyebrow">Plan Enforcer / Authorship layer</text>
  <text x="60" y="90" class="sans title">Meaning gets defended before code starts moving.</text>
  <text x="60" y="118" class="sans subtitle">This is the public authorship chain: `discuss -> draft -> review`, plus bring-your-own-plan intake when you already have a plan source.</text>

  <g transform="translate(40, 184)">
    <rect width="250" height="220" rx="12" fill="url(#cardFill)" stroke="#d29922" stroke-width="1.4" filter="url(#shadow)"/>
    <text x="22" y="36" class="sans kick">Discuss</text>
    <text x="22" y="64" class="sans cardTitle">Freeze the real ask</text>
    <text x="22" y="96" class="sans body">Capture verbatim user intent,</text>
    <text x="22" y="114" class="sans body">non-negotiables, risky forks,</text>
    <text x="22" y="132" class="sans body">and forbidden narrowings.</text>
    <text x="22" y="170" class="sans small">Output: intent packet on disk.</text>
  </g>

  <g transform="translate(330, 184)">
    <rect width="250" height="220" rx="12" fill="url(#cardFill)" stroke="#d29922" stroke-width="1.4" filter="url(#shadow)"/>
    <text x="22" y="36" class="sans kick">Draft</text>
    <text x="22" y="64" class="sans cardTitle">Write the executable plan</text>
    <text x="22" y="96" class="sans body">Turn intent into a phased,</text>
    <text x="22" y="114" class="sans body">repo-aware plan with proof,</text>
    <text x="22" y="132" class="sans body">must-haves, and outputs.</text>
    <text x="22" y="170" class="sans small">Output: `docs/plans/...`.</text>
  </g>

  <g transform="translate(620, 184)">
    <rect width="250" height="220" rx="12" fill="url(#cardFill)" stroke="#d29922" stroke-width="1.4" filter="url(#shadow)"/>
    <text x="22" y="36" class="sans kick">Review</text>
    <text x="22" y="64" class="sans cardTitle">Catch drift before runtime</text>
    <text x="22" y="96" class="sans body">Check the draft against the</text>
    <text x="22" y="114" class="sans body">intent packet for dropped proof,</text>
    <text x="22" y="132" class="sans body">bad narrowing, and weak tasks.</text>
    <text x="22" y="170" class="sans small">Output: review verdict.</text>
  </g>

  <g transform="translate(910, 184)">
    <rect width="250" height="220" rx="12" fill="url(#cardFill)" stroke="#d29922" stroke-width="1.4" filter="url(#shadow)"/>
    <text x="22" y="36" class="sans kick">Bring your own plan</text>
    <text x="22" y="64" class="sans cardTitle">No planner lock-in</text>
    <text x="22" y="96" class="sans body">Use GSD, Superpowers, or your</text>
    <text x="22" y="114" class="sans body">own markdown plan and still run</text>
    <text x="22" y="132" class="sans body">through the same enforcement layer.</text>
    <text x="22" y="170" class="sans small">Authorship optional. Truth is not.</text>
  </g>

  <path d="M290 294 H330" stroke="#d29922" stroke-width="2" stroke-linecap="round"/>
  <path d="M580 294 H620" stroke="#d29922" stroke-width="2" stroke-linecap="round"/>
  <path d="M870 294 H910" stroke="#d29922" stroke-width="2" stroke-linecap="round"/>

  <text x="60" y="486" class="sans footer">Public framing should lead with this chain, not internal skill names.</text>
</svg>
