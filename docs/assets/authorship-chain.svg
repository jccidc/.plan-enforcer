<svg width="1200" height="320" viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Plan Enforcer authorship chain</title>
  <desc id="desc">Four skills that run in sequence when a plan is being authored — Discuss captures user intent, research captures repo reality, plan-enforcer-draft produces the concrete plan, plan-enforcer-review scans it with placeholder + structural + adversarial passes.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#161b22"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <style>
      .sans { font-family: "IBM Plex Sans", "Segoe UI", Arial, sans-serif; }
      .mono { font-family: "IBM Plex Mono", "Cascadia Code", Consolas, monospace; }
      .eyebrow { font-size: 13px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; fill: #8b949e; }
      .title { font-size: 26px; font-weight: 700; letter-spacing: -0.02em; fill: #e6edf3; }
      .subtitle { font-size: 14px; font-weight: 500; fill: #8b949e; }
      .step-num { font-size: 11px; font-weight: 700; fill: #8957e5; letter-spacing: 0.1em; }
      .step-title { font-size: 14px; font-weight: 700; fill: #e6edf3; }
      .step-sub { font-size: 11px; font-weight: 500; fill: #8b949e; }
      .step-cmd { font-size: 11px; font-weight: 600; fill: #58a6ff; }
      .card { fill: #1c2128; stroke: #30363d; stroke-width: 1.5; }
      .arrow { fill: none; stroke: #30363d; stroke-width: 2; }
      .arrowhead { fill: #30363d; }
      .footer { font-size: 11px; font-weight: 500; fill: #6e7681; }
    </style>
    <marker id="arrow-end" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" class="arrowhead"/>
    </marker>
  </defs>

  <rect width="1200" height="320" fill="url(#bg)"/>

  <!-- Header -->
  <text x="60" y="44" class="sans eyebrow">Authorship chain</text>
  <text x="60" y="74" class="sans title">One plan, four passes.</text>
  <text x="60" y="98" class="sans subtitle">Intent, context, draft, review — each skill writes the input for the next.</text>

  <!-- Cards at y=130, w=220, h=140. x at 60, 340, 620, 900. -->

  <!-- Step 1: Discuss -->
  <g transform="translate(60, 130)">
    <rect width="220" height="140" rx="10" class="card" filter="url(#shadow)"/>
    <text x="20" y="28" class="sans step-num">STEP 1 · INTENT</text>
    <text x="20" y="52" class="sans step-title">Discuss</text>
    <text x="20" y="74" class="sans step-sub">Verbatim user quotes +</text>
    <text x="20" y="90" class="sans step-sub">brief (problem, in scope,</text>
    <text x="20" y="106" class="sans step-sub">out of scope).</text>
    <line x1="20" y1="114" x2="200" y2="114" stroke="#30363d" stroke-width="1"/>
    <text x="20" y="132" class="mono step-cmd">.plan-enforcer/discuss.md</text>
  </g>

  <!-- Step 2: Research -->
  <g transform="translate(340, 130)">
    <rect width="220" height="140" rx="10" class="card" filter="url(#shadow)"/>
    <text x="20" y="28" class="sans step-num">STEP 2 · CONTEXT</text>
    <text x="20" y="52" class="sans step-title">research</text>
    <text x="20" y="74" class="sans step-sub">Repo conventions + git log</text>
    <text x="20" y="90" class="sans step-sub">+ test/config constraints,</text>
    <text x="20" y="106" class="sans step-sub">file:line cited.</text>
    <line x1="20" y1="114" x2="200" y2="114" stroke="#30363d" stroke-width="1"/>
    <text x="20" y="132" class="mono step-cmd">.plan-enforcer/research.md</text>
  </g>

  <!-- Step 3: Draft -->
  <g transform="translate(620, 130)">
    <rect width="220" height="140" rx="10" class="card" filter="url(#shadow)"/>
    <text x="20" y="28" class="sans step-num">STEP 3 · PLAN</text>
    <text x="20" y="52" class="sans step-title">plan-enforcer-draft</text>
    <text x="20" y="74" class="sans step-sub">Reads both briefs. Writes</text>
    <text x="20" y="90" class="sans step-sub">concrete plan with anti-</text>
    <text x="20" y="106" class="sans step-sub">rationalization table.</text>
    <line x1="20" y1="114" x2="200" y2="114" stroke="#30363d" stroke-width="1"/>
    <text x="20" y="132" class="mono step-cmd">docs/plans/&lt;slug&gt;.md</text>
  </g>

  <!-- Step 4: Review -->
  <g transform="translate(900, 130)">
    <rect width="220" height="140" rx="10" class="card" filter="url(#shadow)"/>
    <text x="20" y="28" class="sans step-num">STEP 4 · REVIEW</text>
    <text x="20" y="52" class="sans step-title">plan-enforcer-review</text>
    <text x="20" y="74" class="sans step-sub">Placeholder scanner +</text>
    <text x="20" y="90" class="sans step-sub">structural checks +</text>
    <text x="20" y="106" class="sans step-sub">adversarial detectors.</text>
    <line x1="20" y1="114" x2="200" y2="114" stroke="#30363d" stroke-width="1"/>
    <text x="20" y="132" class="mono step-cmd">-review --adversarial</text>
  </g>

  <!-- Arrows between cards at y=200 (vertical mid of cards) -->
  <path d="M 282 200 L 338 200" class="arrow" marker-end="url(#arrow-end)"/>
  <path d="M 562 200 L 618 200" class="arrow" marker-end="url(#arrow-end)"/>
  <path d="M 842 200 L 898 200" class="arrow" marker-end="url(#arrow-end)"/>

  <!-- Footer -->
  <text x="60" y="302" class="sans footer">Each skill is skippable when the inputs are already concrete. The chain is the slow lane; the fast lane bypasses straight to draft.</text>
</svg>
