<svg width="1200" height="520" viewBox="0 0 1200 520" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Plan Enforcer authorship chain</title>
  <desc id="desc">Three-stage authorship chain: discuss captures intent, draft writes the executable plan, review detects drift between packet and plan.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="520" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="card-blue-fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a2840"/>
      <stop offset="1" stop-color="#1c2128"/>
    </linearGradient>
    <linearGradient id="card-amber-fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2a2010"/>
      <stop offset="1" stop-color="#1c2128"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <filter id="glow-blue" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#58a6ff" flood-opacity="0.25"/>
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <filter id="glow-amber" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#d29922" flood-opacity="0.25"/>
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <style>
      .sans { font-family: "IBM Plex Sans", "Segoe UI", Arial, sans-serif; }
      .mono { font-family: "IBM Plex Mono", "Cascadia Code", Consolas, monospace; }
      .eyebrow { font-size: 13px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; fill: #8b949e; }
      .title { font-size: 26px; font-weight: 700; letter-spacing: -0.02em; fill: #e6edf3; }
      .subtitle { font-size: 14px; font-weight: 500; fill: #8b949e; }
      .stage-num { font-size: 12px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; }
      .stage-title { font-size: 20px; font-weight: 700; fill: #e6edf3; }
      .stage-sub { font-size: 13px; font-weight: 500; fill: #8b949e; }
      .callout-title { font-size: 13px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; fill: #d29922; }
      .callout-body { font-size: 14px; font-weight: 500; fill: #c9d1d9; }
      .card-blue { fill: url(#card-blue-fill); stroke: #58a6ff; stroke-width: 1.5; }
      .card-amber { fill: url(#card-amber-fill); stroke: #d29922; stroke-width: 1.5; }
      .card-callout { fill: #1c2128; stroke: #30363d; stroke-width: 1.5; }
      .arrow-blue { fill: none; stroke: #58a6ff; stroke-width: 2; opacity: 0.6; }
      .arrow-amber { fill: none; stroke: #d29922; stroke-width: 2; opacity: 0.6; }
      .arrowhead-blue { fill: #58a6ff; opacity: 0.6; }
      .arrowhead-amber { fill: #d29922; opacity: 0.6; }
    </style>
    <marker id="arrow-blue-end" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" class="arrowhead-blue"/>
    </marker>
    <marker id="arrow-amber-end" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" class="arrowhead-amber"/>
    </marker>
  </defs>

  <rect width="1200" height="520" fill="url(#bg)"/>

  <!-- Header -->
  <text x="60" y="54" class="sans eyebrow">Plan Enforcer / Authorship chain</text>
  <text x="60" y="88" class="sans title">How meaning gets preserved before execution.</text>
  <text x="60" y="114" class="sans subtitle">The moat is not speed. It is making it hard for later stages to quietly replace the original ask with something easier.</text>

  <!-- 3 cards at y=170, w=300, h=180. x: 76, 450, 824. -->
  <g transform="translate(76, 170)">
    <rect width="300" height="180" rx="10" class="card-blue" filter="url(#glow-blue)"/>
    <text x="24" y="34" class="sans stage-num" fill="#58a6ff">Discuss</text>
    <text x="24" y="68" class="sans stage-title">Intent-defense packet</text>
    <line x1="24" y1="84" x2="276" y2="84" stroke="#58a6ff" stroke-width="1" opacity="0.3"/>
    <text x="24" y="110" class="sans stage-sub">&#8226; source ask</text>
    <text x="24" y="132" class="sans stage-sub">&#8226; non-negotiables</text>
    <text x="24" y="154" class="sans stage-sub">&#8226; forbidden narrowings</text>
  </g>

  <g transform="translate(450, 170)">
    <rect width="300" height="180" rx="10" class="card-blue" filter="url(#glow-blue)"/>
    <text x="24" y="34" class="sans stage-num" fill="#58a6ff">Draft</text>
    <text x="24" y="68" class="sans stage-title">Executable phased plan</text>
    <line x1="24" y1="84" x2="276" y2="84" stroke="#58a6ff" stroke-width="1" opacity="0.3"/>
    <text x="24" y="110" class="sans stage-sub">&#8226; repo-aware structure</text>
    <text x="24" y="132" class="sans stage-sub">&#8226; proof-aware handoff</text>
    <text x="24" y="154" class="sans stage-sub">&#8226; explicit phase shape</text>
  </g>

  <g transform="translate(824, 170)">
    <rect width="300" height="180" rx="10" class="card-amber" filter="url(#glow-amber)"/>
    <text x="24" y="34" class="sans stage-num" fill="#d29922">Review</text>
    <text x="24" y="68" class="sans stage-title">Packet-to-plan drift</text>
    <line x1="24" y1="84" x2="276" y2="84" stroke="#d29922" stroke-width="1" opacity="0.3"/>
    <text x="24" y="110" class="sans stage-sub">&#8226; missing proof</text>
    <text x="24" y="132" class="sans stage-sub">&#8226; dropped constraints</text>
    <text x="24" y="154" class="sans stage-sub">&#8226; bad narrowing</text>
  </g>

  <!-- Arrows at y=260 -->
  <path d="M 378 260 L 448 260" class="arrow-blue" marker-end="url(#arrow-blue-end)"/>
  <path d="M 752 260 L 822 260" class="arrow-amber" marker-end="url(#arrow-amber-end)"/>

  <!-- What this buys us -->
  <g transform="translate(76, 380)">
    <rect width="1048" height="100" rx="10" class="card-callout" filter="url(#shadow)"/>
    <text x="24" y="34" class="sans callout-title">What this buys us</text>
    <text x="24" y="66" class="sans callout-body">Better than "brainstorm then code" — meaning survives into plan and review, so execution starts from</text>
    <text x="24" y="86" class="sans callout-body">defended intent instead of a plausible but weaker summary.</text>
  </g>
</svg>
