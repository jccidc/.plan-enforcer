<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 440" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">
  <style>
    .box { fill: #0d1117; stroke: #30363d; stroke-width: 1.5; }
    .box-planner { fill: #161b22; stroke: #30363d; }
    .box-native { fill: #161b22; stroke: #8957e5; stroke-width: 1.5; }
    .box-pe { fill: #1f2937; stroke: #8957e5; stroke-width: 2; }
    .box-output { fill: #0d1117; stroke: #3fb950; stroke-width: 2; }
    .title { fill: #c9d1d9; font-size: 15px; font-weight: 600; }
    .title-native { fill: #d2a8ff; font-size: 15px; font-weight: 600; }
    .sub { fill: #8b949e; font-size: 11px; }
    .pe-title { fill: #d2a8ff; font-size: 16px; font-weight: 700; }
    .pe-sub { fill: #8b949e; font-size: 11px; }
    .arrow { stroke: #484f58; stroke-width: 1.5; fill: none; }
    .arrow-main { stroke: #8957e5; stroke-width: 2; fill: none; }
    .caption { fill: #6e7681; font-size: 11px; font-style: italic; }
    .hdr { fill: #58a6ff; font-size: 11px; font-weight: 600; letter-spacing: 1.2px; }
  </style>

  <!-- Header labels -->
  <text x="50" y="30" class="hdr">PLAN SOURCE</text>
  <text x="50" y="200" class="hdr">ENFORCEMENT LAYER</text>
  <text x="50" y="370" class="hdr">OUTPUT</text>

  <!-- Top row: four plan sources -->
  <rect x="50" y="50" width="185" height="90" rx="6" class="box-native"/>
  <text x="142" y="85" text-anchor="middle" class="title-native">Plan Enforcer drafter</text>
  <text x="142" y="105" text-anchor="middle" class="sub">plan-enforcer-draft</text>
  <text x="142" y="122" text-anchor="middle" class="sub">+ review + Discuss</text>

  <rect x="255" y="50" width="185" height="90" rx="6" class="box-planner"/>
  <text x="347" y="85" text-anchor="middle" class="title">GSD</text>
  <text x="347" y="105" text-anchor="middle" class="sub">phase-based planning</text>
  <text x="347" y="122" text-anchor="middle" class="sub">.planning/ artifacts</text>

  <rect x="460" y="50" width="185" height="90" rx="6" class="box-planner"/>
  <text x="552" y="85" text-anchor="middle" class="title">Superpowers</text>
  <text x="552" y="105" text-anchor="middle" class="sub">writing-plans skill</text>
  <text x="552" y="122" text-anchor="middle" class="sub">executing-plans skill</text>

  <rect x="665" y="50" width="185" height="90" rx="6" class="box-planner"/>
  <text x="757" y="85" text-anchor="middle" class="title">Your own plan</text>
  <text x="757" y="105" text-anchor="middle" class="sub">markdown / checklist</text>
  <text x="757" y="122" text-anchor="middle" class="sub">whiteboard transcript</text>

  <!-- Arrows from planners to PE -->
  <path d="M 142 140 L 142 170 L 450 170 L 450 210" class="arrow"/>
  <path d="M 347 140 L 347 170 L 450 170 L 450 210" class="arrow"/>
  <path d="M 552 140 L 552 170 L 450 170 L 450 210" class="arrow"/>
  <path d="M 757 140 L 757 170 L 450 170 L 450 210" class="arrow"/>

  <!-- Middle: Plan Enforcer -->
  <rect x="50" y="210" width="800" height="110" rx="8" class="box-pe"/>
  <text x="450" y="238" text-anchor="middle" class="pe-title">Plan Enforcer</text>
  <text x="450" y="258" text-anchor="middle" class="pe-sub">Claude Code hooks + single-file ledger + typed Decision Log</text>
  <text x="160" y="288" text-anchor="middle" class="pe-sub">chain-guard</text>
  <text x="290" y="288" text-anchor="middle" class="pe-sub">delete-guard</text>
  <text x="420" y="288" text-anchor="middle" class="pe-sub">evidence-gate</text>
  <text x="560" y="288" text-anchor="middle" class="pe-sub">completion-gate</text>
  <text x="710" y="288" text-anchor="middle" class="pe-sub">audit CLIs</text>
  <text x="450" y="308" text-anchor="middle" class="caption">catches drift at the tool-call level — not advice the agent can ignore</text>

  <!-- Arrow to output -->
  <path d="M 450 320 L 450 350" class="arrow-main"/>
  <polygon points="445,350 455,350 450,360" fill="#8957e5"/>

  <!-- Bottom: output -->
  <rect x="250" y="360" width="400" height="60" rx="6" class="box-output"/>
  <text x="450" y="388" text-anchor="middle" class="title">Audited output</text>
  <text x="450" y="406" text-anchor="middle" class="sub">every edit traced to a plan row or a typed Decision Log entry</text>
</svg>
