<svg width="1200" height="560" viewBox="0 0 1200 560" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Plan Enforcer chain of custody</title>
  <desc id="desc">Five-stage chain of custody: user intent captured as a brief, plan drafted and reviewed, ledger tracks every task, hooks enforce every edit, commits and audit CLIs make the chain queryable.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="560" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#161b22"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <style>
      .sans { font-family: "IBM Plex Sans", "Segoe UI", Arial, sans-serif; }
      .mono { font-family: "IBM Plex Mono", "Cascadia Code", Consolas, monospace; }
      .eyebrow { font-size: 13px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; fill: #8b949e; }
      .title { font-size: 26px; font-weight: 700; letter-spacing: -0.02em; fill: #e6edf3; }
      .stage-num { font-size: 12px; font-weight: 700; fill: #8957e5; }
      .stage-title { font-size: 15px; font-weight: 700; fill: #e6edf3; }
      .stage-sub { font-size: 12px; font-weight: 500; fill: #8b949e; }
      .stage-detail { font-size: 11px; font-weight: 500; fill: #6e7681; }
      .mono-sample { font-size: 11px; font-weight: 500; fill: #8b949e; }
      .mono-hl { font-size: 11px; font-weight: 600; fill: #58a6ff; }
      .mono-good { font-size: 11px; font-weight: 600; fill: #3fb950; }
      .card { fill: #1c2128; stroke: #30363d; stroke-width: 1.5; }
      .arrow { fill: none; stroke: #30363d; stroke-width: 2; }
      .arrowhead { fill: #30363d; }
      .footer { font-size: 11px; font-weight: 500; fill: #6e7681; }
    </style>
    <marker id="arrow-end" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" class="arrowhead"/>
    </marker>
  </defs>

  <rect width="1200" height="560" fill="url(#bg)"/>

  <!-- Header -->
  <text x="60" y="54" class="sans eyebrow">Plan Enforcer</text>
  <text x="60" y="84" class="sans title">Chain of custody, enforced at the tool call.</text>
  <text x="60" y="108" class="sans stage-sub">Every AI-written change traces to an approved plan step or a typed deviation.</text>

  <!-- Five stage cards along a horizontal flow -->
  <!-- Layout: 5 cards at y=150, h=210. x positions: 60, 280, 500, 720, 940. w=200, gap=20. -->

  <!-- Stage 1: Intent -->
  <g transform="translate(60, 150)">
    <rect width="200" height="210" rx="10" class="card" filter="url(#shadow)"/>
    <text x="20" y="32" class="sans stage-num">01 · INTENT</text>
    <text x="20" y="58" class="sans stage-title">Capture what</text>
    <text x="20" y="76" class="sans stage-title">the user asked</text>
    <text x="20" y="104" class="sans stage-sub">plan-enforcer:</text>
    <text x="20" y="122" class="sans stage-sub">Discuss</text>
    <line x1="20" y1="138" x2="180" y2="138" stroke="#30363d" stroke-width="1"/>
    <text x="20" y="160" class="mono mono-sample">.plan-enforcer/</text>
    <text x="20" y="176" class="mono mono-sample">  discuss.md</text>
    <text x="20" y="198" class="sans stage-detail">Brief: problem, in/out</text>
  </g>

  <!-- Stage 2: Plan -->
  <g transform="translate(280, 150)">
    <rect width="200" height="210" rx="10" class="card" filter="url(#shadow)"/>
    <text x="20" y="32" class="sans stage-num">02 · PLAN</text>
    <text x="20" y="58" class="sans stage-title">Draft + review</text>
    <text x="20" y="76" class="sans stage-title">the plan file</text>
    <text x="20" y="104" class="sans stage-sub">plan-enforcer-draft</text>
    <text x="20" y="122" class="sans stage-sub">plan-enforcer-review</text>
    <line x1="20" y1="138" x2="180" y2="138" stroke="#30363d" stroke-width="1"/>
    <text x="20" y="160" class="mono mono-sample">docs/plans/</text>
    <text x="20" y="176" class="mono mono-sample">  2026-04-12-</text>
    <text x="20" y="192" class="mono mono-sample">  auth.md</text>
  </g>

  <!-- Stage 3: Ledger -->
  <g transform="translate(500, 150)">
    <rect width="200" height="210" rx="10" class="card" filter="url(#shadow)"/>
    <text x="20" y="32" class="sans stage-num">03 · LEDGER</text>
    <text x="20" y="58" class="sans stage-title">Track every</text>
    <text x="20" y="76" class="sans stage-title">task + decision</text>
    <text x="20" y="104" class="sans stage-sub">T-rows (tasks)</text>
    <text x="20" y="122" class="sans stage-sub">D-rows (decisions)</text>
    <line x1="20" y1="138" x2="180" y2="138" stroke="#30363d" stroke-width="1"/>
    <text x="20" y="160" class="mono mono-sample">.plan-enforcer/</text>
    <text x="20" y="176" class="mono mono-sample">  ledger.md</text>
    <text x="20" y="198" class="sans stage-detail">v2 schema w/ Chain col</text>
  </g>

  <!-- Stage 4: Hooks -->
  <g transform="translate(720, 150)">
    <rect width="200" height="210" rx="10" class="card" filter="url(#shadow)"/>
    <text x="20" y="32" class="sans stage-num">04 · HOOKS</text>
    <text x="20" y="58" class="sans stage-title">Enforce every</text>
    <text x="20" y="76" class="sans stage-title">tool call</text>
    <text x="20" y="104" class="sans stage-sub">chain-guard</text>
    <text x="20" y="122" class="sans stage-sub">delete-guard</text>
    <text x="20" y="140" class="sans stage-sub">evidence-gate</text>
    <line x1="20" y1="156" x2="180" y2="156" stroke="#30363d" stroke-width="1"/>
    <text x="20" y="176" class="mono mono-sample">PreToolUse blocks</text>
    <text x="20" y="192" class="mono mono-sample">edits w/o a D-row</text>
  </g>

  <!-- Stage 5: Audit -->
  <g transform="translate(940, 150)">
    <rect width="200" height="210" rx="10" class="card" filter="url(#shadow)"/>
    <text x="20" y="32" class="sans stage-num">05 · AUDIT</text>
    <text x="20" y="58" class="sans stage-title">Query the chain</text>
    <text x="20" y="76" class="sans stage-title">after the fact</text>
    <text x="20" y="104" class="sans stage-sub">plan-enforcer-chain</text>
    <text x="20" y="122" class="sans stage-sub">plan-enforcer-why</text>
    <text x="20" y="140" class="sans stage-sub">plan-enforcer-audit</text>
    <line x1="20" y1="156" x2="180" y2="156" stroke="#30363d" stroke-width="1"/>
    <text x="20" y="176" class="mono mono-sample">Commits + evidence</text>
    <text x="20" y="192" class="mono mono-sample">traceable in 1 cmd</text>
  </g>

  <!-- Arrows between cards -->
  <path d="M 262 255 L 278 255" class="arrow" marker-end="url(#arrow-end)"/>
  <path d="M 482 255 L 498 255" class="arrow" marker-end="url(#arrow-end)"/>
  <path d="M 702 255 L 718 255" class="arrow" marker-end="url(#arrow-end)"/>
  <path d="M 922 255 L 938 255" class="arrow" marker-end="url(#arrow-end)"/>

  <!-- Sample output footer block -->
  <g transform="translate(60, 410)">
    <rect width="1080" height="110" rx="8" class="card"/>
    <text x="24" y="28" class="sans eyebrow">Sample — plan-enforcer chain T5</text>
    <text x="24" y="56" class="mono mono-sample">Chain for T5: src/auth/middleware.ts — token verification</text>
    <text x="24" y="76" class="mono mono-sample">  status: <tspan class="mono-good">verified</tspan>   evidence: <tspan class="mono-hl">src/auth/middleware.ts; tests pass</tspan></text>
    <text x="24" y="92" class="mono mono-sample">  chain:  <tspan class="mono-hl">D2</tspan> (pivot — scope expansion), <tspan class="mono-hl">C:a1b2c3d</tspan> (commit), <tspan class="mono-hl">V1</tspan> (tests/auth.test.ts passed)</text>
  </g>

  <!-- Footer credit -->
  <text x="60" y="548" class="sans footer">No cooperative "please log your reasoning" — hooks block the tool call until the typed trail exists.</text>
</svg>
