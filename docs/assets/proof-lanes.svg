<svg width="1200" height="620" viewBox="0 0 1200 620" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Plan Enforcer public proof lanes</title>
  <desc id="desc">Public benchmark and proof frames: execution, authorship, carryover, composability, dogfood, and roadmap regression, shown in the same visual theme as the rest of the launch docs.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="620" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#161b22"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <style>
      .sans { font-family: "IBM Plex Sans", "Segoe UI", Arial, sans-serif; }
      .mono { font-family: "IBM Plex Mono", "Cascadia Code", Consolas, monospace; }
      .eyebrow { font-size: 13px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; fill: #8b949e; }
      .title { font-size: 26px; font-weight: 700; letter-spacing: -0.02em; fill: #e6edf3; }
      .subtitle { font-size: 14px; font-weight: 500; fill: #8b949e; }
      .card { fill: #1c2128; stroke: #30363d; stroke-width: 1.3; }
      .blue { stroke: #58a6ff; }
      .amber { stroke: #d29922; }
      .green { stroke: #3fb950; }
      .purple { stroke: #8957e5; }
      .pink { stroke: #db61a2; }
      .slate { stroke: #8b949e; }
      .card-kicker { font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; }
      .card-title { font-size: 18px; font-weight: 700; fill: #e6edf3; }
      .card-body { font-size: 12px; font-weight: 500; fill: #8b949e; }
      .footer { font-size: 11px; font-weight: 500; fill: #6e7681; }
    </style>
  </defs>

  <rect width="1200" height="620" fill="url(#bg)"/>

  <text x="60" y="54" class="sans eyebrow">Plan Enforcer / Public proof lanes</text>
  <text x="60" y="88" class="sans title">What we can say in public, and why.</text>
  <text x="60" y="114" class="sans subtitle">Six proof frames, each with a different job: credibility, wedge, composability, and operator trust.</text>

  <g transform="translate(40, 160)">
    <rect width="350" height="140" rx="10" class="card blue" filter="url(#shadow)"/>
    <text x="22" y="34" class="sans card-kicker" fill="#58a6ff">Execution</text>
    <text x="22" y="62" class="sans card-title">PE is execution-credible</text>
    <text x="22" y="92" class="sans card-body">Use phased-small and phased-large to prove the system is not just an audit wrapper.</text>
    <text x="22" y="114" class="mono card-body">24 / 24 small  |  98 / 98 large trust</text>
  </g>

  <g transform="translate(425, 160)">
    <rect width="350" height="140" rx="10" class="card amber" filter="url(#shadow)"/>
    <text x="22" y="34" class="sans card-kicker" fill="#d29922">Authorship</text>
    <text x="22" y="62" class="sans card-title">Discuss - draft - review is real</text>
    <text x="22" y="92" class="sans card-body">Public chain exists, but do not overclaim isolated discuss superiority. Fair claim is competitive authorship.</text>
  </g>

  <g transform="translate(810, 160)">
    <rect width="350" height="140" rx="10" class="card green" filter="url(#shadow)"/>
    <text x="22" y="34" class="sans card-kicker" fill="#3fb950">Carryover</text>
    <text x="22" y="62" class="sans card-title">This is the moat wedge</text>
    <text x="22" y="92" class="sans card-body">H through N repeat the same signal: repaired-contract truth survives mutation, interruption, and closure better than the alternatives.</text>
  </g>

  <g transform="translate(40, 340)">
    <rect width="350" height="140" rx="10" class="card purple" filter="url(#shadow)"/>
    <text x="22" y="34" class="sans card-kicker" fill="#8957e5">Composability</text>
    <text x="22" y="62" class="sans card-title">Keep your planner</text>
    <text x="22" y="92" class="sans card-body">Public proof that PE can sit under GSD or Superpowers as an additive enforcement and truth layer.</text>
    <text x="22" y="114" class="mono card-body">GSD + PE 16 / 16  |  SP + PE 16 / 16</text>
  </g>

  <g transform="translate(425, 340)">
    <rect width="350" height="140" rx="10" class="card pink" filter="url(#shadow)"/>
    <text x="22" y="34" class="sans card-kicker" fill="#db61a2">Dogfood</text>
    <text x="22" y="62" class="sans card-title">We live in it ourselves</text>
    <text x="22" y="92" class="sans card-body">Dogfood proves operator usability and has already found real bugs in live repo work. Good for credibility, not for competitor scoring.</text>
  </g>

  <g transform="translate(810, 340)">
    <rect width="350" height="140" rx="10" class="card slate" filter="url(#shadow)"/>
    <text x="22" y="34" class="sans card-kicker" fill="#8b949e">Roadmap regression</text>
    <text x="22" y="62" class="sans card-title">Real pain, not current moat</text>
    <text x="22" y="92" class="sans card-body">Keep this lane public and maintained, but do not pitch it as the current separator. It is a credibility lane, not the wedge.</text>
  </g>

  <g transform="translate(40, 520)">
    <rect width="1120" height="54" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.2"/>
    <text x="24" y="34" class="sans footer">Public launch story should center on execution credibility, authorship reality, carryover moat, composability, and dogfood. Roadmap regression stays in the proof pack, but not as the main wedge.</text>
  </g>
</svg>
